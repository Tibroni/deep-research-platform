version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: deep-research-db
    restart: always
    environment:
      POSTGRES_USER: research_user
      POSTGRES_PASSWORD: research_password
      POSTGRES_DB: deep_research_platform
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: deep-research-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
